{% extends "base.html" %}
{% load static %}
{% load django_bootstrap5 %} 

{% block extra_css %}
<link rel="stylesheet" href="{% static "accounts/css/seller.css" %}">
{% endblock  %}

{% block content %}
 <div class="card-container d-flex justify-content-center">
  <div class="card border-0 p-4 col-lg-4 col-md-4 col-sm-7 col-11 my-5">
   <div class="card-body p-0">
    <form id="sellerForm" action="" method="POST">
      {% csrf_token %}
      <h3 class="text-center fw-semibold my-3">Become a seller</h3>
    
      <div class="form-group mb-3">
        <input class="form-control shadow-none" id="shopName" type="text" name="shop_name" placeholder="Shop Name" />
      </div>
    
      <div class="form-group mb-3">
        <input class="form-control shadow-none" id="gstNumber" type="text" name="gst_number" placeholder="GST Number" />
      </div>
    
      <div class="form-group mb-3">
        <textarea class="form-control shadow-none" id="address" name="address" placeholder="Address"></textarea>
      </div>
    
      <button class="btn w-100" type="submit">Submit</button>
    </form>
   </div>
  </div>
</div>
{% endblock  %}

{% block extra_js %}
<script src="{% static "accounts/js/seller.js" %}"></script>
{% endblock  %}
